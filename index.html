<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>تقرير العقارات السنوي 2025</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WQPJF460RJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());

      gtag('config', 'G-WQPJF460RJ');
    </script>
  </head>
  <body>
    <main class="container mx-auto px-4 min-h-dvh flex items-center justify-center">
      <section class="bg-gray-200 p-8 rounded-lg shadow-xl min-w-md inline-flex items-center justify-center flex-col" aria-labelledby="page-title">
        <h1 class="text-3xl font-bold mb-12">تقرير العقارات السنوي 2025</h1>

        <details class="relative styles_downloadDropdown__DbnXe">
          <summary type="submit" class="bg-indigo-300 rounded-lg shadow-lg px-4 py-2 cursor-pointer">تحميل التقرير</summary>

          <div class="bg-indigo-50/50 absolute w-44 p-2 rounded-lg shadow-lg mt-2 styles_downloadDropdownMenu__FIB1T">
            <a
              id="download-pdf"
              class="bg-indigo-50 p-4 block rounded-lg hover:bg-indigo-100"
              href="sample-report.pdf"
              download
              data-file-name="sample-report.pdf"
            >
              التقرير السنوي
            </a>
          </div>
        </details>
      </section>
    </main>

    <script>
      document.getElementById('download-pdf').addEventListener('click', function (event) {
        var link = event.currentTarget;

        if (typeof gtag === 'function') {
          gtag('event', 'file_download', {
            file_name: link.dataset.fileName,
            file_extension: 'pdf',
            link_url: link.href,
          });
        }
      });
    </script>
  </body>
</html>
